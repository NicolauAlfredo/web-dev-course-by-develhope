<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG e Audio</title>
</head>

<body>

<header>
    <h1>Esempio di SVG e Audio</h1>
</header>

<main>

<section>
    <h2>SVG incorporato nel codice</h2>

    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" stroke="black" stroke-width="3" fill="orange" />
    </svg>

    <p>Questo è un SVG inserito direttamente nel codice HTML.</p>
</section>

<section>
    <h2>SVG esterno</h2>

    <img src="icona.svg" alt="Icona SVG" width="120">

    <p>Questo SVG è caricato da un file esterno.</p>
</section>

<section>
    <h2>Audio</h2>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'elemento audio.
    </audio>

    <p>Usa i controlli per riprodurre o mettere in pausa l'audio.</p>
</section>

</main>

<footer>
    <p>Pagina di esempio HTML con SVG e audio.</p>
</footer>

</body>
</html>
