<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar HTML</title>
</head>

<body>

<header>
    <nav>

        <!-- Sezione logo o titolo della navbar -->
        <div>
            <strong>Navbar</strong>
        </div>

        <!-- Sezione link di navigazione -->
        <div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Link</a></li>

                <!-- Dropdown menu -->
                <li>
                    <a href="#">Dropdown</a>
                    <ul>
                        <li><a href="#">Azione</a></li>
                        <li><a href="#">Un'altra azione</a></li>
                        <li><a href="#">Qualcos'altro</a></li>
                    </ul>
                </li>

                <!-- Elemento non cliccabile (Disabled) -->
                <li>
                    Disabled
                </li>
            </ul>
        </div>

        <!-- Sezione ricerca -->
        <div>
            <form>
                <label for="search">Search:</label>
                <input type="search" id="search" name="search">
                <button type="submit">Search</button>
            </form>
        </div>

    </nav>
</header>

</body>
</html>
