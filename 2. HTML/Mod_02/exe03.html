<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card HTML</title>
</head>

<body>

<main>

    <!-- Card semantica -->
    <article>

        <!-- Immagine della card -->
        <figure>
            <img src="image.jpg" alt="Copertina della card" width="300">
            <figcaption>Image cap</figcaption>
        </figure>

        <!-- Intestazione della card -->
        <header>
            <h2>Card title</h2>
        </header>

        <!-- Testo principale della card -->
        <div>
            <p>
                Some quick example text to build on the card title and make up 
                the bulk of the card's content.
            </p>
        </div>

        <!-- Lista elementi -->
        <ul>
            <li>An item</li>
            <li>A second item</li>
            <li>A third item</li>
        </ul>

        <!-- Link della card -->
        <footer>
            <nav>
                <a href="#">Card link</a>
                <a href="#">Another link</a>
            </nav>
        </footer>

    </article>

</main>

</body>
</html>
