<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Lezione HTML</title>
    <style>
      label {
        display: block;
        margin-top: 10px;
      }
      input, select {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <form action="#" method="post">
      <div>
        <label for="form-email">Email</label>
        <input type="email" id="form-email" name="email" required autocomplete="email" />

        <label for="form-pass">Password</label>
        <input type="password" id="form-pass" name="pass" required autocomplete="new-password" />
      </div>

      <div>
        <label for="form-name">Nome e Cognome</label>
        <input type="text" id="form-name" name="name" required autocomplete="name" />

        <label for="form-dob">Data di nascita</label>
        <input type="date" id="form-dob" name="dob" required />

        <label for="form-tel">Telefono</label>
        <input type="tel" id="form-tel" name="tel" required pattern="[0-9]{10,15}" maxlength="15" inputmode="tel" />
      </div>

      <div>
        <label for="form-plan">Piano di abbonamento</label>
        <select id="form-plan" name="plan" required>
          <option value="">Seleziona un piano</option>
          <option value="0">Free</option>
          <optgroup label="Mensili">
            <option value="199">1.99€/mese</option>
            <option value="599">5.99€/mese</option>
            <option value="1199">11.99€/mese</option>
          </optgroup>
        </select>

        <input id="form-pro" name="pro" type="checkbox" />
        <label for="form-pro">Piano PRO</label>
      </div>

      <div>
        <label for="form-cc">Numero Carta</label>
        <input id="form-cc" name="cc" type="text" required pattern="[0-9]{16}" maxlength="16" inputmode="numeric" autocomplete="cc-number" />

        <label for="form-cvc">CVC</label>
        <input id="form-cvc" name="cvc" type="text" required pattern="[0-9]{3,4}" maxlength="4" inputmode="numeric" autocomplete="cc-csc" />

        <label for="form-exp">Scadenza</label>
        <input id="form-exp" name="exp" type="month" required autocomplete="cc-exp" />

        <label for="form-address">Indirizzo di fatturazione</label>
        <input type="text" id="form-address" name="address" required autocomplete="billing street-address" />
      </div>

      <button type="submit">Registrati</button>
    </form>
  </body>
</html>
