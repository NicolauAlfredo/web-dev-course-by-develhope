<!DOCTYPE html>
<html lang="it">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lezione HTML</title>
</head>

<body>

    <h1>Esempio di Form Elementi HTML</h1>

    <!-- Pulsante disabilitato -->
    <button type="button" disabled>Pulsante Disabilitato</button>

    <br><br>

    <!-- Input number con intervallo 0-100, step 2 e autofocus -->
    <label for="numero">Inserisci un numero (0-100, step 2):</label>
    <input type="number" id="numero" name="numero" min="0" max="100" step="2" autofocus>

    <br><br>

    <!-- Checkbox selezionata di default -->
    <input type="checkbox" id="accetto" name="accetto" checked>
    <label for="accetto">Accetto le condizioni</label>

    <br><br>

    <!-- Input di tipo date -->
    <label for="data">Seleziona una data:</label>
    <input type="date" id="data" name="data">

</body>

</html>
