<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modulo di Registrazione Utente</title>
</head>
<body>
    <header>
        <h1>Modulo di Registrazione Utente</h1>
    </header>
    
    <main>
        <form action="submit_registration.php" method="post">
            <fieldset>
                <legend>Dati Anagrafici</legend>

                <section>
                    <label for="fullname">Nome Completo:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </section>

                <section>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </section>

                <section>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </section>

                <section>
                    <label for="dob">Data di Nascita:</label>
                    <input type="date" id="dob" name="dob" required>
                </section>

                <fieldset>
                    <legend>Genere</legend>
                    <input type="radio" id="male" name="gender" value="Maschio" required>
                    <label for="male">Maschio</label>
                    <input type="radio" id="female" name="gender" value="Femmina">
                    <label for="female">Femmina</label>
                    <input type="radio" id="other" name="gender" value="Altro">
                    <label for="other">Altro</label>
                </fieldset>
            </fieldset>

            <fieldset>
                <legend>Preferenze</legend>

                <section>
                    <label for="color">Colore Preferito:</label>
                    <input type="color" id="color" name="color" required>
                </section>

                <section>
                    <label for="languages">Lingue Parlate:</label>
                    <select id="languages" name="languages[]" multiple required>
                        <option value="italiano">Italiano</option>
                        <option value="inglese">Inglese</option>
                        <option value="francese">Francese</option>
                        <option value="spagnolo">Spagnolo</option>
                    </select>
                </section>

                <section>
                    <label for="description">Descrizione Personale:</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </section>
            </fieldset>

            <section>
                <button type="submit">Invia</button>
            </section>
        </form>
    </main>
</body>
</html>
