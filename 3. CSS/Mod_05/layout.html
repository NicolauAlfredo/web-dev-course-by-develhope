<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="layout.css" />
  </head>
  <body>
    <div class="container">
      <div class="col yellow">
        <h3>YELLOW</h3>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
      </div>

      <div class="col red">
        <h3>RED</h3>
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
      </div>

      <div class="col green">
        <h3>GREEN</h3>
      </div>

      <div class="col orange">
        <h3>ORANGE</h3>
      </div>

      <div class="col blue">
        <h3>BLUE</h3>
      </div>
    </div>
  </body>
</html>
