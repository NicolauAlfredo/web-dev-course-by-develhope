<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lezione CSS</title>
    <style>
      table {
        width: 50%;
        border: 1px solid #263238;
        border-collapse: collapse;
      }

      /* Titolo tabella */
      caption {
        color: #263238;
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 10px;
      }

      /* Header */
      thead th {
        background-color: #455a64;
        color: white;
        font-weight: 700;
      }

      /* Celle */
      th,
      td {
        border: 1px solid #263238;
        padding: 6px;
      }

      /* Righe alternate */
      tbody tr:nth-child(odd) {
        background-color: #eceff1;
      }

      tbody tr:nth-child(even) {
        background-color: #b0bec5;
      }

      /* Ultima riga (footer) */
      tfoot tr {
        background-color: #78909c;
        font-weight: 800;
      }

      /* Colonna entrate */
      tbody td:nth-child(2) {
        color: #003300;
        text-align: right;
      }

      /* Colonna uscite */
      tbody td:nth-child(3) {
        color: #7f0000;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Entrate e uscite
      </caption>
      <thead>
        <tr>
          <th>Mese</th>
          <th>Entrate</th>
          <th>Uscite</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Gennaio</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Febbraio</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Marzo</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Aprile</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Maggio</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Giugno</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Luglio</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Agosto</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Settembre</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Ottobre</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Novembre</td>
          <td>10</td>
          <td>9</td>
        </tr>
        <tr>
          <td>Dicembre</td>
          <td>10</td>
          <td>9</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Totale</td>
          <td>120</td>
          <td>108</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
