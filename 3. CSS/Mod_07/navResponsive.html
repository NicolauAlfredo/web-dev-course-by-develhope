<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nav Responsive</title>
    <style>
      /* RESET BASE */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem;
        background: #f8f9fa;
      }

      /* NAV LIST */
      .nav-list {
        display: flex;
        align-items: center;
        list-style: none;
        gap: 1rem;
      }

      .logo {
        margin-right: 1rem;
      }

      .nav-link {
        text-decoration: none;
        color: #333;
      }

      /* SEARCH */
      .search-wrapper {
        display: flex;
        gap: 0.5rem;
      }

      /* HAMBURGER (default nascosto) */
      .hamburger-menu {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
      }

      .hamburger-menu div {
        width: 25px;
        height: 3px;
        background-color: black;
      }

      /* =========================
   RESPONSIVE < 768px
   ========================= */

      @media (max-width: 768px) {
        .nav-list,
        .search-wrapper {
          display: none;
        }

        .hamburger-menu {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <ul class="nav-list">
        <h1 class="logo">Navbar</h1>

        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link" href="#">Dropdown</a>
          <span>&#x25BC;</span>
        </li>

        <li class="nav-item">
          <button disabled>Disabled</button>
        </li>
      </ul>

      <form class="search-wrapper">
        <input class="search-input" type="search" placeholder="Search" />
        <button class="search" type="submit">Search</button>
      </form>

      <div class="hamburger-menu">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </nav>
  </body>
</html>
